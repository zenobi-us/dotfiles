---
depends:
  - devtools.pi

actions:
  # clean links before recreating them
  - action: command.run
    command: rm
    where: os.name == "linux" || os.name == "macos"
    args:
      - -rf
      - "{{ user.home_dir }}/.pi/agent/{packages,prompts,skills,agents,AGENTS.md}"

  - action: file.link
    to: "{{user.home_dir}}/.pi/agent/packages"
    from: packages

  - action: file.link
    to: "{{user.home_dir}}/.pi/agent/AGENTS.md"
    from: AGENTS.md
