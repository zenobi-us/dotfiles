---
actions:
  - action: file.link
    where: os.name == "linux" || os.name == "macos"
    from: wezterm/.wezterm.lua
    to: "{{user.home_dir}}/.wezterm.lua"

  - action: command.run
    where: os.name == "windows"
    command: pwsh
    args:
      - -c
      - |
        remove-item -force -erroraction SilentlyContinue '{{user.home_dir}}/.wezterm.lua'
        new-item -path "{{user.home_dir}}/.wezterm.lua" -itemtype symboliclink -value "$(pwd)/shells/files/wezterm/.wezterm.lua"
