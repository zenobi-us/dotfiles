# Generated from ~/.pi/agent/pi-worktrees.config.json + Worktrunk tips/patterns
# https://worktrunk.dev/tips-patterns/#dev-server-per-worktree

# Match Pi worktreeRoot: {{mainWorktree}}.worktrees
worktree-path = "{{ repo_path }}/../{{ repo_path | dirname | basename }}.worktrees/{{ branch | sanitize }}"

[[pre-start]]
sync = ""

[[post-start]]
# Approximate Pi onCreate/onSwitch zellij behavior
zellij-tab = """
zellij action query-tab-names | grep -Fxq '{{ branch | sanitize }}' ||
  zellij action new-tab --name '{{ branch | sanitize }}' -- nvim . 2>/dev/null || 
  true
"""

[[post-start]]
zellij-focus = "zellij action go-to-tab-name {{ branch | sanitize }} 2>/dev/null || true"

[[projects."github.com/reckon-limited/reckon-frontend".post-start]]
agent-memory = "[ -e .memory ] || ln -s ~/Projects/ai-memory.zeno/reckon-frontend .memory"
repo-setup = "mise trust; mise setup;"

[[projects."github.com/reckon-limited/reckon-frontend".post-start]]
zellij-pi = """
zellij action new-pane --name pi --cwd {{ worktree_path }} \
  -- pi -p 'use jira skill to read ticket in branch name' 2>/dev/null || true
"""

[pre-remove]
# Stop per-worktree dev server port
server = "lsof -ti :{{ branch | hash_port }} -sTCP:LISTEN | xargs kill 2>/dev/null || true"

[commit]
stage = "all"

[commit.generation]
# Use pimono for commit message generation (reads rendered prompt from stdin)
command = "if command -v pimono >/dev/null 2>&1; then pimono; else printf 'chore: update\n'; fi"

[merge]
squash = false
commit = false
rebase = false
