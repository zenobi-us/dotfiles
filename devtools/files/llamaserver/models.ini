
[*]
; Disable automatic memory fitting so you can control exact limits
fit = off

; Full GPU offload (All layers go to RTX 3090)
ngl = 999 

; MTP (Multi-Token Prediction) Settings
spec-draft-n-max = 3
draft-p-min = 0

; KV Cache Quantization to save VRAM (allows higher context windows)
cache-type-k = q4_0
cache-type-v = q4_0

; Context & Processing
flash-attn = on
ctx-size = 65536
batch-size = 4096
ubatch-size = 1024

; Other Parameters
jinja = true
temp = 0.6
top-p = 0.95
top-k = 20

