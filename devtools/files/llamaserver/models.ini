[default]
model = /path/to/your/large-model.gguf
# Enable multi-token prediction to boost your 3090 speeds
mtp-drafters = 3
# Offload the entire layer stack to the 3090 (24GB)
gpu-layers = 99
# Set the desired context size (e.g., 65536)
ctx-size = 65536

[secondary-model]
model = /path/to/your/smaller-model.gguf
gpu-layers = 99
