# pi-hooks example: atomic-commit-snapshot-worker
#
# Drop these two hooks into <project>/.pi/hook/hooks.yaml (preferred) or
# <project>/.pi/hooks.yaml. Trust that repo/worktree first, then replace
# <snapshot-example-dir> with the path to this example directory on disk.
#
# See the README in this directory for prerequisites and verification steps.

hooks:
  # Capture every write/edit and queue it for a git commit. async: true keeps
  # the agent unblocked while the snapshot work happens in the background.
  - id: snapshot-autocommit
    event: file.changed
    async: true
    actions:
      - bash: 'python3 <snapshot-example-dir>/snapshot-hook.py'

  # Drain the queue synchronously when the session ends so commits don't trail
  # off after the session is gone. exit 2 means work remains; exit 0 means clean.
  - id: snapshot-flush-on-exit
    event: session.deleted
    actions:
      - bash: 'python3 <snapshot-example-dir>/snapshot-worker.py --flush --repo "$PI_PROJECT_DIR"'
